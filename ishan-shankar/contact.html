<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/e8ed852c07.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="navbar">
        <div class="left">
            <h1>MyLogo<sup>&reg;</sup></h1>
        </div>
        <div class="center">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li class="active"><a href="contact.html">Contact</a></li>
            </ul>
        </div>
        <div class="right">
            <button onclick="document.location.href = 'contact.html'">Hire Me!</button>
        </div>
    </div>
    <div class="container">
        <div class="content">
            <h1>Contact Me<span class="underline"></span></h1>
            <p class="text-muted">For hiring requests, please DM!</p>
            <form action="contact.html" method="post" class="myForm">
                <input type="text" name="name" placeholder="Name" autocomplete="off">
                <input type="email" name="email" placeholder="Email" autocomplete="off">
                <textarea name="msg" id="msg" placeholder="Message" rows="7" autocomplete="off"></textarea>
                <div class="buttonArea">
                    <button type="submit">Send</button>
                    <button type="reset">Clear</button>
                </div>
            </form>
        </div>
    </div>
    <div class="footer">
        <div class="links">
            <ul>
                <li>
                    <h3><i class="fa-brands fa-facebook" style="color: #008397;"></i></h3>
                </li>
                <li>
                    <h3><i class="fa-brands fa-whatsapp" style="color: #008397;"></i></h2>
                </li>
                <li>
                    <h3><i class="fa-brands fa-linkedin" style="color: #008397;"></i></h2>
                </li>
                <li>
                    <h3><i class="fa-brands fa-x-twitter" style="color: #008397;"></i></h2>
                </li>
            </ul>
        </div>
        <div class="copyright text-muted">
            <p>&copy; All rights reserved.</p>
        </div>
    </div>
</body>

</html>
